<!DOCTYPE html>
<html>
<head>
<title>Pricing Card</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* Card */
.pricing {
  max-width: 300px;
  width: 90%;
  margin: 50px auto;
  background-color: #fff;
  box-shadow: 0 0 10px #ccc; /* fixed typo */
  padding: 20px;
  text-align: center;
  border-radius: 10px;
}

/* Title */
.title {
  font-size: 22px;
  font-weight: bold;
}

/* Price */
.price {
  font-size: 18px;
  color: green;
  margin: 10px 0;
}

/* Features */
.features {
  list-style: none;
  padding: 0;
}

.features li {
  padding: 8px;
  border-bottom: 1px solid #eee;
}

/* Button */
.btn {
  background: blue;
  color: white;
  padding: 10px 20px;
  border: none;
  margin-top: 15px;
  cursor: pointer;
  border-radius: 5px;
  transition: 0.3s;
}

.btn:hover {
  background: darkblue;
}
</style>
</head>

<body>

<div class="pricing">
  <h2 class="title">Basic Plan</h2> <!-- fixed closing tag -->
  <p class="price">$9.99 /month</p>

  <ul class="features">
    <li>1 GB Storage</li>
    <li>Basic Support</li>
    <li>All Core Features</li>
  </ul>

  <button class="btn">Start Trial</button>
</div>

</body>
</html>
